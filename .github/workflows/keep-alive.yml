name: Supabase Keep Alive

# Supabase 무료 플랜은 DB 쿼리가 7일간 없으면 프로젝트가 일시정지됩니다.
# 매일 한 번 videos 테이블에 가벼운 SELECT 쿼리를 날려 타이머를 리셋합니다.

on:
  schedule:
    # 매일 UTC 00:00 (한국시간 오전 9시)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/videos?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP status: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase ping 성공 - 프로젝트 활성 상태 유지"
          else
            echo "❌ Supabase ping 실패 (status $response)"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
